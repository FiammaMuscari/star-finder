name: Update Trending Snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: write

concurrency:
  group: trending-snapshots
  cancel-in-progress: false

jobs:
  update-snapshots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update snapshot file
        run: pnpm snapshots:update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit snapshot changes
        run: |
          if git diff --quiet -- server-data/trending-snapshots server-data/trending-snapshots.json; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- server-data/trending-snapshots server-data/trending-snapshots.json
          git commit -m "chore: update trending snapshots"
          git push origin HEAD:main
